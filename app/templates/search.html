{% extends "base.html" %}
{% block content %}
<div class="container py-5">
  <!-- Header Card -->
  <div class="bg-white border border-light rounded shadow-sm p-4 mb-4">
    <span class="rounded-pill px-3 py-1 bg-primary text-white text-uppercase fs-12 fw-bold">Search Engine</span>
    <h2 class="text-dark font-weight-bold mt-2 mb-1">Knowledge Search</h2>
    <p class="text-muted mb-0">Query across meeting transcripts, raw text, generated summaries, decisions, actions, and risks.</p>
  </div>

  <!-- Search Input & Filters Card -->
  <div class="card border-light shadow-sm mb-4">
    <div class="card-body p-4">
      <form id="search-form" class="row g-3">
        <div class="col-12">
          <div class="input-group input-group-lg border rounded-pill overflow-hidden px-2 py-1 bg-white shadow-sm">
            <span class="input-group-text border-0 bg-transparent text-muted"><span class="material-symbols-outlined">search</span></span>
            <input type="text" id="query" name="query" value="{{ query }}" class="form-control border-0 bg-transparent text-dark" style="box-shadow: none;" placeholder="Type search terms here (e.g. testing, flight control, design, risk)..." required>
            <button type="submit" class="btn btn-warning rounded-pill px-4 text-dark fw-bold">Search</button>
          </div>
        </div>
        <div class="col-12">
          <div class="d-flex align-items-center flex-wrap gap-3 mt-2">
            <span class="text-muted fw-semibold fs-14">Filter by Type:</span>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="filter_type" id="filter-all" value="all" checked>
              <label class="form-check-label text-dark fs-14" for="filter-all">All Results</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="filter_type" id="filter-docs" value="documents">
              <label class="form-check-label text-dark fs-14" for="filter-docs">Documents</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="filter_type" id="filter-decisions" value="decisions">
              <label class="form-check-label text-dark fs-14" for="filter-decisions">Decisions</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="filter_type" id="filter-actions" value="actions">
              <label class="form-check-label text-dark fs-14" for="filter-actions">Actions</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="filter_type" id="filter-risks" value="risks">
              <label class="form-check-label text-dark fs-14" for="filter-risks">Risks</label>
            </div>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- Results Card -->
  <div class="card border-light shadow-sm">
    <div class="card-header bg-white border-bottom border-light py-3">
      <h4 class="card-title mb-0 text-dark fw-bold">Search Results</h4>
    </div>
    <div class="card-body">
      <div id="search-results">
        <div class="text-center py-5">
          <span class="material-symbols-outlined text-muted fs-48">search</span>
          <p class="text-muted mt-2 mb-0">Run a query above to scan the project repository.</p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
